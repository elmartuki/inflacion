<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin</title>
    <style>
      body {
        background-color: #121212;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      form {
        background-color: #1e1e1e;
        padding: 2em;
        border-radius: 10px;
        box-shadow: 0 0 10px #000;
      }
      input {
        display: block;
        margin: 1em 0;
        padding: 0.5em;
        width: 100%;
        border: none;
        border-radius: 5px;
      }
      button {
        background: #03a9f4;
        color: white;
        border: none;
        padding: 0.7em;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form method="POST" action="https://https://inflacionsemanal.netlify.app/:4000/login">
      <h2>Login de Administrador</h2>
      <input type="text" name="usuario" placeholder="Usuario" required />
      <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
      />
      <button type="submit">Iniciar sesión</button>
    </form>
  </body>
</html>
